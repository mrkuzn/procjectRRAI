services:
  db:
    image: postgres:16
    container_name: datamind-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: datamind
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d datamind"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
